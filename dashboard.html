<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Career-Ops Dashboard</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0d1117;
    --bg2:       #161b22;
    --bg3:       #21262d;
    --border:    #30363d;
    --text:      #e6edf3;
    --muted:     #8b949e;
    --accent:    #58a6ff;
    --green:     #3fb950;
    --yellow:    #d29922;
    --red:       #f85149;
    --purple:    #bc8cff;
    --sidebar-w: 240px;
  }

  html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; }

  /* ── Layout ── */
  #app { display: flex; height: 100vh; overflow: hidden; }

  #sidebar {
    width: var(--sidebar-w);
    min-width: var(--sidebar-w);
    background: var(--bg2);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
  }

  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Sidebar header ── */
  .sidebar-header {
    padding: 16px 14px 12px;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-header h1 { font-size: 15px; font-weight: 600; color: var(--text); letter-spacing: .02em; }
  .sidebar-header p  { font-size: 11px; color: var(--muted); margin-top: 2px; }

  /* ── Sidebar groups ── */
  .group-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--muted);
    padding: 14px 14px 4px;
  }

  .cmd-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    width: 100%;
    padding: 7px 14px;
    background: none;
    border: none;
    color: var(--text);
    cursor: pointer;
    text-align: left;
    border-radius: 0;
    transition: background .12s;
    font-size: 13px;
  }
  .cmd-btn:hover  { background: var(--bg3); }
  .cmd-btn.active { background: var(--bg3); color: var(--accent); }
  .cmd-btn:disabled { opacity: .45; cursor: not-allowed; }
  .cmd-btn .icon  { font-size: 14px; width: 18px; text-align: center; flex-shrink: 0; }
  .cmd-btn .label { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .pending-badge {
    font-size: 10px;
    font-weight: 700;
    padding: 1px 6px;
    border-radius: 10px;
    background: var(--yellow);
    color: #000;
    min-width: 18px;
    text-align: center;
    flex-shrink: 0;
  }

  /* ── Topbar ── */
  #topbar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 18px;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
    min-height: 46px;
  }
  #cmd-title    { font-size: 14px; font-weight: 600; flex: 1; }
  #cmd-desc     { font-size: 12px; color: var(--muted); }
  #status-badge {
    font-size: 11px;
    font-weight: 600;
    padding: 2px 9px;
    border-radius: 20px;
    border: 1px solid var(--border);
    color: var(--muted);
    background: var(--bg3);
    white-space: nowrap;
  }
  #status-badge.running { color: var(--yellow); border-color: var(--yellow); }
  #status-badge.done    { color: var(--green);  border-color: var(--green);  }
  #status-badge.error   { color: var(--red);    border-color: var(--red);    }

  #stop-btn {
    padding: 4px 12px;
    font-size: 12px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg3);
    color: var(--text);
    cursor: pointer;
    display: none;
    white-space: nowrap;
  }
  #stop-btn:hover { border-color: var(--red); color: var(--red); }
  #stop-btn.visible { display: flex; align-items: center; gap: 5px; }

  #restart-btn {
    padding: 4px 10px; font-size: 12px; border-radius: 6px;
    border: 1px solid var(--border); background: var(--bg3);
    color: var(--muted); cursor: pointer; white-space: nowrap;
  }
  #restart-btn:hover { border-color: var(--accent); color: var(--accent); }
  #restart-btn:disabled { opacity: .4; cursor: not-allowed; }

  /* ── Panel ── */
  #panel { flex: 1; overflow: hidden; position: relative; display: flex; flex-direction: column; }

  /* Terminal */
  #terminal {
    flex: 1;
    overflow-y: auto;
    padding: 14px 18px;
    font-family: 'Cascadia Code', 'Fira Code', 'JetBrains Mono', Consolas, monospace;
    font-size: 13px;
    line-height: 1.55;
    white-space: pre-wrap;
    word-break: break-all;
  }
  #terminal.hidden { display: none; }
  #terminal-output { color: var(--text); }
  .t-dim     { color: var(--muted); }
  .t-ok      { color: var(--green);  }
  .t-warn    { color: var(--yellow); }
  .t-err     { color: var(--red);    }
  .t-accent  { color: var(--accent); }
  .cursor {
    display: inline-block;
    width: 8px; height: 14px;
    background: var(--accent);
    vertical-align: text-bottom;
    animation: blink 1s step-end infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* Welcome screen */
  /* Non-terminal panels stay absolutely positioned within #panel */
  #welcome, #table-wrap, #stats-wrap, #patterns-wrap, #followup-wrap, #report-wrap {
    position: absolute; inset: 0;
  }

  #welcome {
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 8px;
    color: var(--muted);
  }
  #welcome.hidden { display: none; }
  #welcome .big   { font-size: 40px; }
  #welcome p      { font-size: 13px; }

  /* Table */
  #table-wrap {
    position: absolute; inset: 0;
    overflow-y: auto;
    padding: 14px 18px;
  }
  #table-wrap.hidden { display: none; }

  #score-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  #score-table thead th {
    text-align: left;
    padding: 6px 10px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .06em;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0;
    background: var(--bg);
  }
  #score-table tbody tr { border-bottom: 1px solid var(--border); transition: background .1s; }
  #score-table tbody tr:hover { background: var(--bg2); }
  #score-table td { padding: 7px 10px; vertical-align: middle; }

  .score-pill {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 12px;
    font-size: 12px;
    font-weight: 700;
    min-width: 46px;
    text-align: center;
  }
  .score-green  { background: rgba(63,185,80,.15);  color: var(--green);  border: 1px solid rgba(63,185,80,.35);  }
  .score-yellow { background: rgba(210,153,34,.15); color: var(--yellow); border: 1px solid rgba(210,153,34,.35); }
  .score-red    { background: rgba(248,81,73,.15);  color: var(--red);    border: 1px solid rgba(248,81,73,.35);  }

  .status-chip {
    display: inline-block;
    padding: 1px 7px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 500;
    background: var(--bg3);
    color: var(--muted);
    border: 1px solid var(--border);
  }
  .status-applied   { color: var(--accent);  border-color: rgba(88,166,255,.4);  background: rgba(88,166,255,.08);  }
  .status-interview { color: var(--green);   border-color: rgba(63,185,80,.4);   background: rgba(63,185,80,.08);   }
  .status-offer     { color: var(--purple);  border-color: rgba(188,140,255,.4); background: rgba(188,140,255,.08); }
  .status-rejected  { color: var(--red);     border-color: rgba(248,81,73,.3);   background: rgba(248,81,73,.06);   }
  .status-discarded { color: var(--muted);   border-color: var(--border);        }
  .status-evaluated { color: var(--yellow);  border-color: rgba(210,153,34,.4);  background: rgba(210,153,34,.07);  }

  .table-meta { font-size: 12px; color: var(--muted); }

  #table-toolbar { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }

  .filter-btn {
    padding: 4px 10px; font-size: 12px; border-radius: 6px;
    border: 1px solid var(--border); background: var(--bg3);
    color: var(--muted); cursor: pointer; white-space: nowrap;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--text); }
  .filter-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(88,166,255,.08); }

  #score-table tbody tr[data-report-path] { cursor: pointer; }

  /* Report panel */
  #report-wrap {
    position: absolute; inset: 0;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  #report-wrap.hidden { display: none; }

  #report-toolbar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 18px;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
    flex-shrink: 0;
  }
  #back-btn {
    padding: 4px 12px;
    font-size: 12px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg3);
    color: var(--text);
    cursor: pointer;
  }
  #back-btn:hover { border-color: var(--accent); color: var(--accent); }
  #report-label { font-size: 12px; color: var(--muted); }

  #report-content {
    flex: 1;
    overflow-y: auto;
    padding: 20px 28px;
    max-width: 860px;
    font-size: 13px;
    line-height: 1.65;
  }
  #report-content h1 { font-size: 17px; font-weight: 700; margin: 0 0 14px; }
  #report-content h2 { font-size: 11px; font-weight: 700; margin: 22px 0 8px; color: var(--accent); text-transform: uppercase; letter-spacing: .07em; }
  #report-content h3 { font-size: 13px; font-weight: 600; margin: 14px 0 5px; }
  #report-content p  { margin: 3px 0; color: var(--text); }
  #report-content hr { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
  #report-content strong { font-weight: 600; color: var(--text); }
  #report-content em { font-style: italic; color: var(--muted); }
  #report-content code { background: var(--bg3); padding: 1px 5px; border-radius: 3px; font-family: 'Cascadia Code', Consolas, monospace; font-size: 12px; }
  #report-content ul { margin: 5px 0 5px 20px; list-style: disc; }
  #report-content li { margin: 2px 0; }
  #report-content a  { color: var(--accent); text-decoration: none; }
  #report-content a:hover { text-decoration: underline; }
  #report-content br { display: block; margin: 3px 0; content: ''; }
  #report-content ol { margin: 5px 0 5px 20px; }

  .md-table { width: 100%; border-collapse: collapse; margin: 10px 0 14px; font-size: 13px; }
  .md-table th { text-align: left; padding: 5px 10px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); border-bottom: 2px solid var(--border); background: var(--bg2); }
  .md-table td { padding: 6px 10px; border-bottom: 1px solid var(--border); vertical-align: top; line-height: 1.5; }
  .md-table tr:last-child td { border-bottom: none; }
  .md-table tbody tr:hover td { background: rgba(255,255,255,.03); }

  /* Stats view */
  #stats-wrap { position: absolute; inset: 0; overflow-y: auto; padding: 18px 22px; }
  #stats-wrap.hidden { display: none; }

  .stats-cards { display: flex; gap: 12px; margin-bottom: 18px; flex-wrap: wrap; }
  .stat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 14px 20px; flex: 1; min-width: 110px; }
  .stat-card .sv { font-size: 30px; font-weight: 700; line-height: 1; }
  .stat-card .sl { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; margin-top: 4px; }

  .stats-row { display: flex; gap: 14px; margin-bottom: 18px; }
  .stats-block { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; flex: 1; }
  .stats-block.full { flex: none; width: 100%; }
  .sb-heading { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: var(--muted); margin-bottom: 12px; }

  .bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; font-size: 12px; }
  .bar-label { width: 70px; color: var(--muted); }
  .bar-track { flex: 1; height: 6px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 3px; transition: width .3s; }
  .bar-count { width: 48px; text-align: right; color: var(--muted); }

  .open-row { display: flex; align-items: center; gap: 12px; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .open-row:last-child { border-bottom: none; }
  .open-info { flex: 1; min-width: 0; }
  .open-company { font-weight: 500; }
  .open-role { color: var(--muted); font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .open-age { font-size: 12px; white-space: nowrap; color: var(--muted); }
  .open-age.warn { color: var(--yellow); }
  .open-age.stale { color: var(--red); }
  .stats-note { font-size: 12px; color: var(--muted); margin-top: 10px; }

  /* Follow-up view */
  #followup-wrap { position: absolute; inset: 0; overflow-y: auto; padding: 18px 22px; }
  #followup-wrap.hidden { display: none; }

  .fu-cards { display: flex; gap: 10px; margin-bottom: 18px; flex-wrap: wrap; }
  .fu-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 12px 18px; flex: 1; min-width: 90px; text-align: center; }
  .fu-card .fv { font-size: 26px; font-weight: 700; line-height: 1; }
  .fu-card .fl { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; margin-top: 3px; }

  .fu-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .fu-table thead th { text-align: left; padding: 6px 10px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg); }
  .fu-table tbody tr { border-bottom: 1px solid var(--border); transition: background .1s; }
  .fu-table tbody tr:hover { background: var(--bg2); }
  .fu-table td { padding: 8px 10px; vertical-align: middle; }

  .urgency-badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; }
  .urgency-urgent  { background: rgba(248,81,73,.15);  color: var(--red);    border: 1px solid rgba(248,81,73,.35); }
  .urgency-overdue { background: rgba(210,153,34,.15); color: var(--yellow); border: 1px solid rgba(210,153,34,.35); }
  .urgency-waiting { background: rgba(88,166,255,.08); color: var(--accent); border: 1px solid rgba(88,166,255,.25); }
  .urgency-cold    { background: var(--bg3); color: var(--muted); border: 1px solid var(--border); }

  .fu-next-overdue { color: var(--red); font-weight: 600; }
  .fu-next-soon    { color: var(--yellow); }
  .fu-empty { color: var(--muted); font-size: 13px; text-align: center; padding: 32px 0; }

  /* Patterns view */
  #patterns-wrap { position: absolute; inset: 0; overflow-y: auto; padding: 18px 22px; }
  #patterns-wrap.hidden { display: none; }

  .patterns-section { margin-bottom: 18px; }
  .patterns-section .sb-heading { margin-bottom: 10px; }

  .rec-list { display: flex; flex-direction: column; gap: 8px; }
  .rec-card {
    background: var(--bg2); border: 1px solid var(--border); border-radius: 8px;
    padding: 12px 14px; display: flex; gap: 12px; align-items: flex-start;
  }
  .rec-card.impact-high  { border-left: 3px solid var(--red); }
  .rec-card.impact-medium { border-left: 3px solid var(--yellow); }
  .rec-impact {
    font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em;
    padding: 2px 6px; border-radius: 4px; white-space: nowrap; margin-top: 1px; flex-shrink: 0;
  }
  .rec-impact.high   { background: rgba(248,81,73,.15);  color: var(--red); }
  .rec-impact.medium { background: rgba(210,153,34,.15); color: var(--yellow); }
  .rec-body { flex: 1; min-width: 0; }
  .rec-action  { font-size: 13px; font-weight: 500; margin-bottom: 3px; }
  .rec-reason  { font-size: 12px; color: var(--muted); line-height: 1.5; }

  .funnel-row { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; font-size: 12px; }
  .funnel-label { width: 90px; color: var(--muted); text-transform: capitalize; }
  .funnel-track { flex: 1; height: 8px; background: var(--bg3); border-radius: 4px; overflow: hidden; }
  .funnel-fill  { height: 100%; border-radius: 4px; }
  .funnel-count { width: 60px; text-align: right; color: var(--muted); }
  .funnel-pct   { width: 36px; text-align: right; font-size: 11px; color: var(--muted); }

  .score-compare-table { width: 100%; font-size: 12px; border-collapse: collapse; }
  .score-compare-table th { text-align: left; padding: 4px 10px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); border-bottom: 1px solid var(--border); }
  .score-compare-table td { padding: 6px 10px; border-bottom: 1px solid var(--border); }
  .score-compare-table tr:last-child td { border-bottom: none; }

  .threshold-box {
    background: var(--bg2); border: 1px solid rgba(88,166,255,.3); border-radius: 8px;
    padding: 12px 16px; display: flex; align-items: center; gap: 14px;
  }
  .threshold-num { font-size: 32px; font-weight: 700; color: var(--accent); line-height: 1; flex-shrink: 0; }
  .threshold-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; }
  .threshold-reason { font-size: 12px; color: var(--muted); margin-top: 4px; line-height: 1.5; }

  .gap-pill { display: inline-flex; align-items: center; gap: 6px; background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; padding: 4px 10px; font-size: 12px; margin: 3px; }
  .gap-pill-count { font-size: 11px; font-weight: 700; color: var(--red); }

  .patterns-error { color: var(--yellow); font-size: 13px; padding: 20px 0; text-align: center; }

  /* Status panel */
  #panel-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.45);
    z-index: 99; display: none;
  }
  #panel-overlay.open { display: block; }

  #status-panel {
    position: fixed; top: 0; right: 0;
    width: 400px; height: 100vh;
    background: var(--bg2);
    border-left: 1px solid var(--border);
    z-index: 100; display: flex; flex-direction: column;
    transform: translateX(100%);
    transition: transform .2s ease;
  }
  #status-panel.open { transform: translateX(0); }

  #sp-header {
    display: flex; align-items: flex-start; gap: 8px;
    padding: 14px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  #sp-title { flex: 1; }
  #sp-company { font-size: 13px; font-weight: 600; }
  #sp-role { font-size: 12px; color: var(--muted); margin-top: 2px; }
  #sp-close { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 18px; line-height: 1; padding: 0; flex-shrink: 0; }
  #sp-close:hover { color: var(--text); }

  #sp-log { flex: 1; overflow-y: auto; padding: 12px 16px; }
  .sp-empty { font-size: 12px; color: var(--muted); text-align: center; padding: 24px 0; }
  .sp-event { margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
  .sp-event:last-child { border-bottom: none; margin-bottom: 0; }
  .sp-event-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
  .sp-event-date { font-size: 11px; color: var(--muted); }
  .sp-event-notes { font-size: 12px; color: var(--muted); line-height: 1.5; }

  #sp-form {
    border-top: 1px solid var(--border);
    padding: 14px 16px; flex-shrink: 0; background: var(--bg);
  }
  #sp-form-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); margin-bottom: 10px; }
  .sp-row { display: flex; gap: 8px; margin-bottom: 8px; }
  #sp-event-select, #sp-date-input {
    background: var(--bg2); border: 1px solid var(--border);
    color: var(--text); border-radius: 6px; padding: 5px 8px; font-size: 12px; flex: 1;
  }
  #sp-notes-input {
    width: 100%; background: var(--bg2); border: 1px solid var(--border);
    color: var(--text); border-radius: 6px; padding: 6px 8px; font-size: 12px;
    resize: vertical; min-height: 54px; font-family: inherit; margin-bottom: 8px; display: block;
  }
  #sp-save-btn {
    width: 100%; padding: 7px; border-radius: 6px;
    background: var(--accent); color: #000; border: none;
    font-size: 12px; font-weight: 600; cursor: pointer;
  }
  #sp-save-btn:hover { opacity: .88; }
  #sp-save-btn:disabled { opacity: .4; cursor: not-allowed; }

  #log-activity-btn {
    padding: 4px 12px; font-size: 12px; border-radius: 6px;
    border: 1px solid var(--border); background: var(--bg3); color: var(--text); cursor: pointer;
  }
  #log-activity-btn:hover { border-color: var(--accent); color: var(--accent); }
  .history-btn {
    padding: 2px 8px; font-size: 11px; border-radius: 10px;
    border: 1px solid var(--border); background: var(--bg3);
    color: var(--muted); cursor: pointer; white-space: nowrap;
  }
  .history-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* Liveness action panel */
  #liveness-actions {
    border-top: 1px solid var(--border);
    padding: 14px 18px;
    background: var(--bg2);
    flex-shrink: 0;
    display: none;
  }
  #liveness-actions.visible { display: block; }
  .la-heading { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: var(--muted); margin-bottom: 10px; }
  .la-row { display: flex; align-items: center; gap: 10px; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .la-row:last-child { border-bottom: none; }
  .la-info { flex: 1; min-width: 0; }
  .la-company { font-weight: 500; }
  .la-role { font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .la-reason { font-size: 11px; color: var(--muted); margin-top: 1px; }
  .la-btn { padding: 3px 10px; font-size: 12px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg3); color: var(--text); cursor: pointer; white-space: nowrap; flex-shrink: 0; }
  .la-btn:hover { border-color: var(--accent); color: var(--accent); }
  .la-btn.danger:hover { border-color: var(--red); color: var(--red); }
  .la-btn:disabled { opacity: .4; cursor: not-allowed; }
  .la-done { font-size: 12px; color: var(--muted); padding: 3px 10px; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>
<div id="app">

  <!-- Sidebar -->
  <aside id="sidebar">
    <div class="sidebar-header">
      <h1>Career-Ops</h1>
      <p>Job Search Dashboard</p>
    </div>
    <div id="nav"></div>
  </aside>

  <!-- Main -->
  <div id="main">
    <div id="topbar">
      <div style="flex:1;min-width:0">
        <div id="cmd-title">Career-Ops Dashboard</div>
        <div id="cmd-desc">Select a command from the sidebar</div>
      </div>
      <button id="restart-btn" onclick="restartServer()" title="Restart dashboard server">↺ Restart</button>
      <button id="stop-btn" onclick="killServer()"><span id="stop-label">Stop</span></button>
      <div id="status-badge">idle</div>
    </div>

    <div id="panel">
      <div id="welcome">
        <div class="big">🎯</div>
        <p>Select a command from the sidebar to get started.</p>
      </div>

      <div id="terminal" class="hidden">
        <div id="terminal-output"></div>
        <span id="cursor" class="cursor hidden"></span>
      </div>
      <div id="liveness-actions">
        <div class="la-heading">Suggested Actions</div>
        <div id="liveness-action-rows"></div>
      </div>

      <div id="followup-wrap" class="hidden">
        <div id="followup-content"></div>
      </div>

      <div id="patterns-wrap" class="hidden">
        <div id="patterns-content"></div>
      </div>

      <div id="stats-wrap" class="hidden">
        <div class="stats-cards" id="stats-cards"></div>
        <div class="stats-row">
          <div class="stats-block" id="stats-stage-block">
            <div class="sb-heading">By Stage</div>
            <div id="stats-stage"></div>
          </div>
          <div class="stats-block" id="stats-score-block">
            <div class="sb-heading">Score Distribution</div>
            <div id="stats-scores"></div>
            <div class="stats-note" id="stats-rate"></div>
          </div>
        </div>
        <div class="stats-block" id="stats-open-block">
          <div class="sb-heading">Open Applications</div>
          <div id="stats-open"></div>
        </div>
      </div>

      <div id="report-wrap" class="hidden">
        <div id="report-toolbar">
          <button id="back-btn" onclick="backToTable()">← Score Table</button>
          <button id="log-activity-btn" onclick="openActivityFromReport()">+ Log Activity</button>
          <span id="report-label"></span>
        </div>
        <div id="report-content"></div>
      </div>

      <div id="table-wrap" class="hidden">
        <div id="table-toolbar">
          <div class="table-meta" id="table-meta" style="flex:1"></div>
          <button class="filter-btn" id="hide-rejected-btn" onclick="toggleHideRejected()">Hide Rejected</button>
        </div>
        <table id="score-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Score</th>
              <th>Company</th>
              <th>Role</th>
              <th>Status</th>
              <th>Date</th>
              <th>Report / History</th>
            </tr>
          </thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
(function () {
  'use strict';

  var currentCmd = null;
  var currentES  = null;
  var outputEl   = document.getElementById('terminal-output');
  var cursorEl   = document.getElementById('cursor');

  // ── Build sidebar ────────────────────────────────────────────────
  fetch('/commands')
    .then(function(r) { return r.json(); })
    .then(function(cmds) {
      var nav    = document.getElementById('nav');
      var groups = {};
      cmds.forEach(function(c) {
        if (!groups[c.group]) groups[c.group] = [];
        groups[c.group].push(c);
      });
      Object.keys(groups).forEach(function(g) {
        var label = document.createElement('div');
        label.className = 'group-label';
        label.textContent = g;
        nav.appendChild(label);
        groups[g].forEach(function(c) {
          var btn = document.createElement('button');
          btn.className = 'cmd-btn';
          btn.id = 'btn-' + c.id;
          btn.title = c.description || '';
          btn.innerHTML = '<span class="icon">' + c.icon + '</span><span class="label">' + c.label + '</span>';
          btn.addEventListener('click', function() { runCommand(c); });
          nav.appendChild(btn);
        });
      });
      refreshPipelineBadge();
    })
    .catch(function(e) {
      document.getElementById('nav').innerHTML = '<div style="padding:12px;color:var(--red);font-size:12px;">Failed to load commands</div>';
    });

  function refreshPipelineBadge() {
    fetch('/pipeline-count')
      .then(function(r) { return r.json(); })
      .then(function(d) {
        var btn = document.getElementById('btn-pipeline');
        if (!btn) return;
        var existing = btn.querySelector('.pending-badge');
        if (d.count > 0) {
          if (!existing) {
            var badge = document.createElement('span');
            badge.className = 'pending-badge';
            btn.appendChild(badge);
            existing = badge;
          }
          existing.textContent = d.count;
        } else if (existing) {
          existing.remove();
        }
      })
      .catch(function() {});
  }

  // Badge is refreshed after nav builds (above) and after pipeline runs complete

  // ── Run a command ────────────────────────────────────────────────
  window.runCommand = function(cmd) {
    if (currentES) { currentES.close(); currentES = null; }

    currentCmd = cmd;
    setActive(cmd.id);
    setTitle(cmd.icon + ' ' + cmd.label, cmd.description || '');

    if (cmd.type === 'table')    { showTable();    return; }
    if (cmd.type === 'stats')    { showStats();    return; }
    if (cmd.type === 'patterns') { showPatterns(); return; }
    if (cmd.type === 'followup') { showFollowup(); return; }
    showTerminal();
    clearOutput();
    appendLine('▶ ' + cmd.label + '\n');
    setStatus('running');
    showCursor(true);
    showStop(true);

    var url = '/run/' + cmd.id;
    var es  = new EventSource(url);
    currentES = es;

    var isLiveness = (cmd.id === 'liveness');
    var livenessResults = [];

    es.onmessage = function(e) {
      appendLine(e.data);
      if (isLiveness) {
        var m = e.data.match(/(✅|❌|⚠️)\s+(active|expired|uncertain)\s+(https?:\/\/\S+)/);
        if (m) livenessResults.push({ status: m[2], url: m[3] });
      }
    };
    es.addEventListener('done', function() {
      es.close();
      currentES = null;
      showCursor(false);
      showStop(false);
      setStatus('done');
      refreshPipelineBadge();
      if (isLiveness && livenessResults.some(function(r) { return r.status !== 'active'; })) {
        showLivenessActions(livenessResults);
      }
    });
    es.onerror = function() {
      if (es.readyState === EventSource.CLOSED) return;
      es.close();
      currentES = null;
      showCursor(false);
      showStop(false);
      setStatus('error');
      appendLine('[connection lost]');
    };
  };

  function showLivenessActions(results) {
    var actionable = results.filter(function(r) { return r.status !== 'active'; });
    if (!actionable.length) return;
    fetch('/url-map')
      .then(function(r) { return r.json(); })
      .then(function(urlMap) {
        var container = document.getElementById('liveness-action-rows');
        container.innerHTML = '';
        actionable.forEach(function(r) {
          var entry = null;
          for (var i = 0; i < urlMap.length; i++) {
            if (urlMap[i].url === r.url) { entry = urlMap[i]; break; }
          }
          var row = document.createElement('div');
          row.className = 'la-row';

          var info = document.createElement('div');
          info.className = 'la-info';
          var shortUrl = r.url.length > 65 ? r.url.slice(0, 64) + '…' : r.url;
          var statusLabel = r.status === 'expired' ? '❌ expired' : '⚠️ uncertain';
          if (entry) {
            info.innerHTML =
              '<div class="la-company">' + esc(entry.company) + '</div>' +
              '<div class="la-role">' + esc(entry.role) + '</div>' +
              '<div class="la-reason">' + statusLabel + ' · ' + esc(shortUrl) + '</div>';
          } else {
            info.innerHTML =
              '<div class="la-company" style="color:var(--muted)">No matching application found</div>' +
              '<div class="la-reason">' + statusLabel + ' · ' + esc(shortUrl) + '</div>';
          }
          row.appendChild(info);

          if (entry) {
            var discardBtn = document.createElement('button');
            discardBtn.className = 'la-btn danger';
            discardBtn.textContent = 'Mark Discarded';
            (function(btn, appNum, rowEl) {
              btn.addEventListener('click', function() { laDiscard(btn, appNum, rowEl); });
            })(discardBtn, entry.appNum, row);
            row.appendChild(discardBtn);

            if (r.status === 'uncertain') {
              var keepBtn = document.createElement('button');
              keepBtn.className = 'la-btn';
              keepBtn.textContent = 'Keep Active';
              (function(btn, rowEl) {
                btn.addEventListener('click', function() { laMarkDone(rowEl, '✓ Kept active'); });
              })(keepBtn, row);
              row.appendChild(keepBtn);
            }
          }
          container.appendChild(row);
        });
        if (container.children.length) {
          document.getElementById('liveness-actions').classList.add('visible');
        }
      })
      .catch(function() {});
  }

  function laDiscard(btn, appNum, row) {
    btn.disabled = true;
    btn.textContent = 'Saving…';
    fetch('/liveness-action', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ appNum: appNum, action: 'discard' })
    })
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (d.ok) {
        laMarkDone(row, '✓ Marked discarded');
      } else {
        btn.disabled = false;
        btn.textContent = 'Mark Discarded';
      }
    })
    .catch(function() {
      btn.disabled = false;
      btn.textContent = 'Mark Discarded';
    });
  }

  function laMarkDone(row, label) {
    row.querySelectorAll('button').forEach(function(b) { b.style.display = 'none'; });
    var done = document.createElement('span');
    done.className = 'la-done';
    done.textContent = label;
    row.appendChild(done);
  }

  window.stopRun = function() {
    if (currentES) { currentES.close(); currentES = null; }
    showCursor(false);
    showStop(false);
    setStatus('idle');
    appendLine('[stopped]');
  };

  window.killServer = function() {
    fetch('/kill', { method: 'POST' })
      .then(function(r) { return r.json(); })
      .then(function(d) {
        if (currentES) { currentES.close(); currentES = null; }
        showCursor(false);
        showStop(false);
        setStatus('idle');
        if (document.getElementById('terminal').classList.contains('hidden') === false) {
          appendLine('[process killed]');
        }
      })
      .catch(function() {});
  };

  window.restartServer = function() {
    var btn = document.getElementById('restart-btn');
    btn.disabled = true;
    btn.textContent = 'Restarting…';
    fetch('/restart-server', { method: 'POST' })
      .catch(function() {})
      .finally(function() {
        setTimeout(function() { location.reload(); }, 1500);
      });
  };

  // Poll server process status every 2s so Stop button reflects reality across refreshes
  function pollProcStatus() {
    fetch('/proc-status')
      .then(function(r) { return r.json(); })
      .then(function(d) {
        if (d.running) {
          var lbl = document.getElementById('stop-label');
          if (lbl) lbl.textContent = 'Stop' + (d.label ? ' · ' + d.label : '');
          showStop(true);
          if (document.getElementById('status-badge').textContent === 'idle') setStatus('running');
        } else if (!currentES) {
          showStop(false);
        }
      })
      .catch(function() {});
  }
  setInterval(pollProcStatus, 2000);
  pollProcStatus();

  // ── Table view ───────────────────────────────────────────────────
  function showTable() {
    setStatus('running');
    hideAllPanels();
    var wrap = document.getElementById('table-wrap');
    wrap.classList.remove('hidden');
    document.getElementById('table-body').innerHTML = '';
    document.getElementById('table-meta').textContent = 'Loading…';

    fetch('/table-data')
      .then(function(r) { return r.json(); })
      .then(function(rows) {
        renderTable(rows);
        setStatus('done');
      })
      .catch(function() {
        document.getElementById('table-meta').textContent = 'Failed to load table data.';
        setStatus('error');
      });
  }

  function renderTable(rows) {
    var tbody = document.getElementById('table-body');
    tbody.innerHTML = '';
    document.getElementById('table-meta').textContent = rows.length + ' applications, sorted by match score';

    rows.forEach(function(r, i) {
      var tr = document.createElement('tr');

      var scoreClass = r.score >= 4.0 ? 'score-green' : r.score >= 3.0 ? 'score-yellow' : 'score-red';

      var statusLower = (r.status || '').toLowerCase();
      var statusClass = 'status-chip';
      if (statusLower === 'applied')   statusClass += ' status-applied';
      else if (statusLower === 'interview') statusClass += ' status-interview';
      else if (statusLower === 'offer')     statusClass += ' status-offer';
      else if (statusLower === 'rejected')  statusClass += ' status-rejected';
      else if (statusLower === 'discarded') statusClass += ' status-discarded';
      else if (statusLower === 'evaluated') statusClass += ' status-evaluated';

      tr.dataset.appNum  = r.num;
      tr.dataset.company = r.company;
      tr.dataset.role    = r.role;
      tr.dataset.status  = statusLower;
      if (r.reportPath) {
        tr.dataset.reportPath  = r.reportPath;
        tr.dataset.reportLabel = r.company + ' — ' + r.role;
      }

      var reportNum = r.reportPath
        ? '<span style="color:var(--accent);font-size:12px;font-weight:500">' + (r.reportNum || '#') + '</span>'
        : '';
      var historyBtn = '<button class="history-btn" data-panel-trigger="1" style="margin-left:' + (reportNum ? '8px' : '0') + '">History</button>';

      tr.innerHTML =
        '<td style="color:var(--muted);font-size:12px">' + (i + 1) + '</td>' +
        '<td><span class="score-pill ' + scoreClass + '">' + r.scoreStr + '</span></td>' +
        '<td style="font-weight:500">' + esc(r.company) + '</td>' +
        '<td style="color:var(--muted)">' + esc(r.role) + '</td>' +
        '<td><span class="' + statusClass + '">' + esc(r.status) + '</span></td>' +
        '<td style="color:var(--muted);font-size:12px;white-space:nowrap">' + esc(r.date) + '</td>' +
        '<td style="white-space:nowrap">' + reportNum + historyBtn + '</td>';

      tbody.appendChild(tr);
    });

    if (rows.length === 0) {
      var tr = document.createElement('tr');
      tr.innerHTML = '<td colspan="7" style="color:var(--muted);text-align:center;padding:24px">No applications found in applications.md</td>';
      tbody.appendChild(tr);
    }
    applyRejectedFilter();
  }

  var hideRejected = false;

  window.toggleHideRejected = function() {
    hideRejected = !hideRejected;
    var btn = document.getElementById('hide-rejected-btn');
    btn.textContent = hideRejected ? 'Show Rejected' : 'Hide Rejected';
    btn.classList.toggle('active', hideRejected);
    applyRejectedFilter();
  };

  function applyRejectedFilter() {
    var rows = document.querySelectorAll('#table-body tr');
    var visible = 0;
    rows.forEach(function(tr) {
      var s = tr.dataset.status || '';
      var hide = hideRejected && (s === 'rejected' || s === 'discarded');
      tr.style.display = hide ? 'none' : '';
      if (!hide) visible++;
    });
    var meta = document.getElementById('table-meta');
    if (hideRejected) {
      meta.textContent = visible + ' of ' + rows.length + ' applications shown — rejected & discarded hidden';
    } else {
      meta.textContent = rows.length + ' applications, sorted by match score';
    }
  }

  // Row-click delegation — history button → activity panel, row → report
  document.getElementById('table-body').addEventListener('click', function(e) {
    if (e.target.tagName === 'A') return;
    var tr = e.target.closest('tr');
    if (!tr || !tr.dataset.appNum) return;
    if (e.target.closest('[data-panel-trigger]')) {
      openStatusPanel(tr.dataset.appNum, tr.dataset.company, tr.dataset.role);
      return;
    }
    if (e.target.tagName === 'BUTTON') return;
    if (tr.dataset.reportPath) {
      showReport(tr.dataset.reportPath, tr.dataset.reportLabel, tr.dataset.appNum);
    }
  });

  // ── Report view ───────────────────────────────────────────────────
  var currentReportAppNum = null;

  function appNumFromReportPath(p) {
    var m = p && p.match(/[\/\\](\d+)-/);
    return m ? parseInt(m[1], 10) : null;
  }

  function showReport(reportPath, label, appNum) {
    currentReportAppNum = appNum != null ? parseInt(appNum) : appNumFromReportPath(reportPath);
    hideAllPanels();
    document.getElementById('report-wrap').classList.remove('hidden');
    document.getElementById('report-label').textContent = label || '';
    document.getElementById('report-content').innerHTML = '<span style="color:var(--muted)">Loading…</span>';
    setTitle('📄 Report', label || '');
    setStatus('running');

    fetch('/report?path=' + encodeURIComponent(reportPath))
      .then(function(r) { return r.json(); })
      .then(function(d) {
        document.getElementById('report-content').innerHTML = markdownToHtml(d.content);
        setStatus('done');
      })
      .catch(function() {
        document.getElementById('report-content').innerHTML = '<span style="color:var(--red)">Failed to load report.</span>';
        setStatus('error');
      });
  }

  window.backToTable = function() {
    hideAllPanels();
    document.getElementById('table-wrap').classList.remove('hidden');
    setActive('table');
    setTitle('📊 Score Table', 'All evaluated jobs sorted by match score');
    setStatus('done');
  };

  // ── Stats view ────────────────────────────────────────────────────
  function showStats() {
    hideAllPanels();
    document.getElementById('stats-wrap').classList.remove('hidden');
    setStatus('running');
    fetch('/stats-data')
      .then(function(r) { return r.json(); })
      .then(function(d) { renderStats(d); setStatus('done'); })
      .catch(function() { setStatus('error'); });
  }

  function renderStats(d) {
    var t = d.totals;

    // Summary cards
    var cards = [
      { label: 'Evaluated', value: t.evaluated, color: 'var(--muted)' },
      { label: 'Applied',   value: t.applied,   color: 'var(--accent)' },
      { label: 'Active',    value: t.active,     color: 'var(--green)' },
      { label: 'Closed',    value: t.closed,     color: 'var(--red)' },
    ];
    document.getElementById('stats-cards').innerHTML = cards.map(function(c) {
      return '<div class="stat-card"><div class="sv" style="color:' + c.color + '">' + c.value + '</div><div class="sl">' + c.label + '</div></div>';
    }).join('');

    // By Stage bars
    var stageOrder = ['Applied','Responded','Interview','Offer','Rejected','Discarded'];
    var stageColors = { Applied: 'var(--accent)', Responded: 'var(--accent)', Interview: 'var(--green)', Offer: 'var(--purple)', Rejected: 'var(--red)', Discarded: 'var(--muted)' };
    var maxStage = Math.max(1, Math.max.apply(null, stageOrder.map(function(s) { return d.byStage[s] || 0; })));
    document.getElementById('stats-stage').innerHTML = stageOrder.map(function(s) {
      var n = d.byStage[s] || 0;
      var pct = Math.round(n / maxStage * 100);
      return '<div class="bar-row"><span class="bar-label">' + s + '</span>' +
        '<div class="bar-track"><div class="bar-fill" style="width:' + pct + '%;background:' + stageColors[s] + '"></div></div>' +
        '<span class="bar-count">' + n + '</span></div>';
    }).join('');

    // Score distribution bars
    var total = t.evaluated || 1;
    var scoreBands = [
      { label: '4.0+',   key: 'high', color: 'var(--green)' },
      { label: '3.0–3.9', key: 'mid',  color: 'var(--yellow)' },
      { label: '<3.0',   key: 'low',  color: 'var(--red)' },
    ];
    document.getElementById('stats-scores').innerHTML = scoreBands.map(function(b) {
      var n = d.scores[b.key] || 0;
      var pct = Math.round(n / total * 100);
      return '<div class="bar-row"><span class="bar-label">' + b.label + '</span>' +
        '<div class="bar-track"><div class="bar-fill" style="width:' + pct + '%;background:' + b.color + '"></div></div>' +
        '<span class="bar-count">' + n + ' <span style="color:var(--muted);font-size:11px">(' + pct + '%)</span></span></div>';
    }).join('');
    document.getElementById('stats-rate').textContent = d.weeklyRate != null
      ? d.weeklyRate + ' applications/week (since ' + d.weeklyRateSince + ')'
      : 'No applications yet';

    // Open applications
    var openEl = document.getElementById('stats-open');
    if (!d.openApps.length) {
      openEl.innerHTML = '<div style="color:var(--muted);font-size:12px;padding:8px 0">No active applications.</div>';
    } else {
      openEl.innerHTML = d.openApps.map(function(a) {
        var ageClass = a.ageDays > 30 ? 'open-age stale' : a.ageDays > 14 ? 'open-age warn' : 'open-age';
        var ageLabel = a.ageDays === 0 ? 'today' : a.ageDays + ' day' + (a.ageDays !== 1 ? 's' : '');
        return '<div class="open-row">' +
          '<div class="open-info"><div class="open-company">' + esc(a.company) + '</div>' +
          '<div class="open-role">' + esc(a.role) + '</div></div>' +
          '<span class="' + statusChipClass(a.status) + '">' + esc(a.status) + '</span>' +
          '<span class="' + ageClass + '">' + ageLabel + '</span>' +
          '</div>';
      }).join('');
    }
  }

  // ── Follow-up view ────────────────────────────────────────────────
  function showFollowup() {
    hideAllPanels();
    document.getElementById('followup-wrap').classList.remove('hidden');
    document.getElementById('followup-content').innerHTML = '<div class="fu-empty">Loading…</div>';
    setStatus('running');
    fetch('/followup-data')
      .then(function(r) { return r.json(); })
      .then(function(d) { renderFollowup(d); setStatus('done'); })
      .catch(function() {
        document.getElementById('followup-content').innerHTML = '<div class="fu-empty" style="color:var(--red)">Failed to load follow-up data.</div>';
        setStatus('error');
      });
  }

  function renderFollowup(d) {
    var el = document.getElementById('followup-content');
    if (d.error) {
      el.innerHTML = '<div class="fu-empty">' + esc(d.error) + '</div>';
      return;
    }
    var m = d.metadata;
    var html = '';

    // Summary cards
    var cards = [
      { label: 'Urgent',  value: m.urgent,  color: 'var(--red)' },
      { label: 'Overdue', value: m.overdue, color: 'var(--yellow)' },
      { label: 'Waiting', value: m.waiting, color: 'var(--accent)' },
      { label: 'Cold',    value: m.cold,    color: 'var(--muted)' },
    ];
    html += '<div class="fu-cards">';
    cards.forEach(function(c) {
      html += '<div class="fu-card"><div class="fv" style="color:' + c.color + '">' + c.value + '</div><div class="fl">' + esc(c.label) + '</div></div>';
    });
    html += '</div>';

    if (!d.entries || !d.entries.length) {
      html += '<div class="fu-empty">No active applications to track.</div>';
      el.innerHTML = html;
      return;
    }

    html += '<table class="fu-table"><thead><tr>' +
      '<th>Urgency</th><th>#</th><th>Company</th><th>Role</th><th>Status</th>' +
      '<th>Age (d)</th><th>F/U</th><th>Next follow-up</th>' +
      '</tr></thead><tbody>';

    d.entries.forEach(function(e) {
      var urg = e.urgency || 'waiting';
      var urgBadge = '<span class="urgency-badge urgency-' + urg + '">' + urg + '</span>';

      var nextStr = '—';
      var nextClass = '';
      if (e.nextFollowupDate) {
        if (e.daysUntilNext !== null && e.daysUntilNext < 0) {
          nextStr = e.nextFollowupDate + ' (' + Math.abs(e.daysUntilNext) + 'd overdue)';
          nextClass = 'fu-next-overdue';
        } else if (e.daysUntilNext !== null && e.daysUntilNext <= 2) {
          nextStr = e.nextFollowupDate + ' (in ' + e.daysUntilNext + 'd)';
          nextClass = 'fu-next-soon';
        } else {
          nextStr = e.nextFollowupDate + (e.daysUntilNext !== null ? ' (in ' + e.daysUntilNext + 'd)' : '');
        }
      } else if (urg === 'cold') {
        nextStr = 'Max follow-ups reached';
      }

      html += '<tr>' +
        '<td>' + urgBadge + '</td>' +
        '<td style="color:var(--muted);font-size:12px">' + esc(String(e.num)) + '</td>' +
        '<td style="font-weight:500">' + esc(e.company) + '</td>' +
        '<td style="color:var(--muted);font-size:12px;max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="' + esc(e.role) + '">' + esc(e.role) + '</td>' +
        '<td><span class="' + statusChipClass(e.status) + '">' + esc(e.status) + '</span></td>' +
        '<td style="color:var(--muted);font-size:12px">' + e.daysSinceApplication + '</td>' +
        '<td style="color:var(--muted);font-size:12px;text-align:center">' + e.followupCount + '</td>' +
        '<td class="' + nextClass + '" style="font-size:12px">' + esc(nextStr) + '</td>' +
        '</tr>';
    });

    html += '</tbody></table>';
    el.innerHTML = html;
  }

  // ── Patterns view ─────────────────────────────────────────────────
  function showPatterns() {
    hideAllPanels();
    document.getElementById('patterns-wrap').classList.remove('hidden');
    document.getElementById('patterns-content').innerHTML = '<div class="patterns-error">Loading…</div>';
    setStatus('running');
    fetch('/patterns-data')
      .then(function(r) { return r.json(); })
      .then(function(d) { renderPatterns(d); setStatus('done'); })
      .catch(function() {
        document.getElementById('patterns-content').innerHTML = '<div class="patterns-error">Failed to load pattern data.</div>';
        setStatus('error');
      });
  }

  function renderPatterns(d) {
    var el = document.getElementById('patterns-content');
    if (d.error) {
      el.innerHTML = '<div class="patterns-error">' + esc(d.error) + '</div>';
      return;
    }

    var html = '';
    var m = d.metadata;

    // ── Header ──
    html += '<div style="margin-bottom:18px">' +
      '<div style="font-size:15px;font-weight:600;margin-bottom:4px">Pattern Analysis</div>' +
      '<div style="font-size:12px;color:var(--muted)">' + m.total + ' applications · ' +
        m.dateRange.from + ' to ' + m.dateRange.to + ' · ' +
        m.byOutcome.positive + ' positive, ' + m.byOutcome.negative + ' rejected, ' +
        m.byOutcome.pending + ' pending' +
      '</div></div>';

    // ── Recommendations ──
    if (d.recommendations && d.recommendations.length) {
      html += '<div class="patterns-section"><div class="sb-heading">Recommendations</div><div class="rec-list">';
      d.recommendations.forEach(function(r) {
        html += '<div class="rec-card impact-' + esc(r.impact) + '">' +
          '<span class="rec-impact ' + esc(r.impact) + '">' + esc(r.impact) + '</span>' +
          '<div class="rec-body"><div class="rec-action">' + esc(r.action) + '</div>' +
          '<div class="rec-reason">' + esc(r.reasoning) + '</div></div></div>';
      });
      html += '</div></div>';
    }

    // ── Two-column row: Funnel + Score comparison ──
    html += '<div style="display:flex;gap:14px;margin-bottom:18px">';

    // Funnel
    var funnelOrder = ['evaluated','applied','responded','interview','offer','rejected','discarded'];
    var funnelColors = { evaluated:'var(--muted)', applied:'var(--accent)', responded:'var(--accent)',
      interview:'var(--green)', offer:'var(--purple)', rejected:'var(--red)', discarded:'var(--muted)' };
    var funnelMax = Math.max(1, Math.max.apply(null, funnelOrder.map(function(s){ return d.funnel[s]||0; })));
    html += '<div class="stats-block" style="flex:1"><div class="sb-heading">Conversion Funnel</div>';
    funnelOrder.forEach(function(s) {
      var n = d.funnel[s] || 0;
      if (!n) return;
      var pct = Math.round(n / funnelMax * 100);
      var pctOfTotal = Math.round(n / m.total * 100);
      html += '<div class="funnel-row">' +
        '<span class="funnel-label">' + s + '</span>' +
        '<div class="funnel-track"><div class="funnel-fill" style="width:' + pct + '%;background:' + funnelColors[s] + '"></div></div>' +
        '<span class="funnel-count">' + n + '</span>' +
        '<span class="funnel-pct">' + pctOfTotal + '%</span></div>';
    });
    html += '</div>';

    // Score comparison
    html += '<div class="stats-block" style="flex:1"><div class="sb-heading">Score by Outcome</div>' +
      '<table class="score-compare-table"><thead><tr><th>Outcome</th><th>Avg</th><th>Range</th><th>N</th></tr></thead><tbody>';
    var outcomeOrder = [['positive','Progressed','var(--green)'],['negative','Rejected','var(--red)'],['pending','Pending','var(--muted)']];
    outcomeOrder.forEach(function(row) {
      var key = row[0], label = row[1], color = row[2];
      var s = d.scoreComparison[key];
      if (!s || !s.count) return;
      html += '<tr><td style="color:' + color + '">' + label + '</td>' +
        '<td style="font-weight:600">' + s.avg + '</td>' +
        '<td style="color:var(--muted)">' + s.min + '–' + s.max + '</td>' +
        '<td style="color:var(--muted)">' + s.count + '</td></tr>';
    });
    html += '</tbody></table>';
    if (d.scoreThreshold && d.scoreThreshold.recommended) {
      html += '<div style="margin-top:12px"><div class="threshold-box">' +
        '<div><div class="threshold-num">' + d.scoreThreshold.recommended + '</div>' +
        '<div class="threshold-label">min score to apply</div></div>' +
        '<div class="threshold-reason">' + esc(d.scoreThreshold.reasoning) + '</div></div></div>';
    }
    html += '</div>';
    html += '</div>'; // end two-col row

    // ── Two-column row: Archetypes + Blockers ──
    html += '<div style="display:flex;gap:14px;margin-bottom:18px">';

    // Archetypes
    if (d.archetypeBreakdown && d.archetypeBreakdown.length) {
      var topArch = d.archetypeBreakdown.filter(function(a){ return a.archetype !== 'Unknown'; }).slice(0, 6);
      var archMax = Math.max(1, Math.max.apply(null, topArch.map(function(a){ return a.total; })));
      html += '<div class="stats-block" style="flex:1"><div class="sb-heading">By Role Archetype</div>';
      topArch.forEach(function(a) {
        var pct = Math.round(a.total / archMax * 100);
        var conv = a.conversionRate;
        html += '<div class="bar-row">' +
          '<span class="bar-label" style="width:120px;font-size:11px" title="' + esc(a.archetype) + '">' +
            esc(a.archetype.length > 14 ? a.archetype.slice(0,13) + '…' : a.archetype) + '</span>' +
          '<div class="bar-track"><div class="bar-fill" style="width:' + pct + '%;background:var(--accent)"></div></div>' +
          '<span class="bar-count" style="width:70px">' + a.total + ' <span style="color:' + (conv > 0 ? 'var(--green)':'var(--muted)') + ';font-size:11px">(' + conv + '%)</span></span></div>';
      });
      html += '</div>';
    }

    // Blockers
    if (d.blockerAnalysis && d.blockerAnalysis.length) {
      var blockMax = Math.max(1, d.blockerAnalysis[0].frequency);
      html += '<div class="stats-block" style="flex:1"><div class="sb-heading">Top Blockers</div>';
      d.blockerAnalysis.forEach(function(b) {
        var pct = Math.round(b.frequency / blockMax * 100);
        html += '<div class="bar-row">' +
          '<span class="bar-label" style="width:140px;font-size:11px">' + esc(b.blocker.replace(/-/g,' ')) + '</span>' +
          '<div class="bar-track"><div class="bar-fill" style="width:' + pct + '%;background:var(--red)"></div></div>' +
          '<span class="bar-count">' + b.frequency + 'x <span style="color:var(--muted);font-size:11px">(' + b.percentage + '%)</span></span></div>';
      });
      html += '</div>';
    }

    html += '</div>'; // end two-col row

    // ── Two-column row: Remote policy + Tech gaps ──
    html += '<div style="display:flex;gap:14px;margin-bottom:18px">';

    // Remote policy
    if (d.remotePolicy && d.remotePolicy.length) {
      var remMax = Math.max(1, Math.max.apply(null, d.remotePolicy.map(function(r){ return r.total; })));
      html += '<div class="stats-block" style="flex:1"><div class="sb-heading">Remote Policy</div>';
      d.remotePolicy.forEach(function(r) {
        var pct = Math.round(r.total / remMax * 100);
        var conv = r.conversionRate;
        html += '<div class="bar-row">' +
          '<span class="bar-label" style="width:130px;font-size:11px">' + esc(r.policy.replace(/-/g,' ')) + '</span>' +
          '<div class="bar-track"><div class="bar-fill" style="width:' + pct + '%;background:var(--accent)"></div></div>' +
          '<span class="bar-count" style="width:80px">' + r.total + ' <span style="color:' + (conv > 0 ? 'var(--green)':'var(--muted)') + ';font-size:11px">(' + conv + '%✓)</span></span></div>';
      });
      html += '</div>';
    }

    // Tech gaps
    if (d.techStackGaps && d.techStackGaps.length) {
      html += '<div class="stats-block" style="flex:1"><div class="sb-heading">Tech Gaps in Rejections</div>' +
        '<div style="display:flex;flex-wrap:wrap;margin-top:4px">';
      d.techStackGaps.slice(0, 12).forEach(function(g) {
        html += '<div class="gap-pill"><span>' + esc(g.skill) + '</span><span class="gap-pill-count">' + g.frequency + 'x</span></div>';
      });
      html += '</div></div>';
    }

    html += '</div>'; // end two-col row

    el.innerHTML = html;
  }

  window.openActivityFromReport = function() {
    if (!currentReportAppNum) return;
    var label = document.getElementById('report-label').textContent;
    var sep = label.indexOf(' — ');
    var company = sep >= 0 ? label.slice(0, sep) : label;
    var role    = sep >= 0 ? label.slice(sep + 3) : '';
    openStatusPanel(currentReportAppNum, company, role);
  };

  // ── Activity / Status panel ───────────────────────────────────────
  var currentPanelAppNum = null;

  function openStatusPanel(appNum, company, role) {
    currentPanelAppNum = parseInt(appNum);
    document.getElementById('sp-company').textContent = company || '';
    document.getElementById('sp-role').textContent    = role || '';
    document.getElementById('sp-date-input').value   = new Date().toISOString().slice(0, 10);
    document.getElementById('sp-notes-input').value  = '';
    document.getElementById('sp-save-btn').disabled  = false;
    document.getElementById('sp-save-btn').textContent = 'Add Event';
    document.getElementById('status-panel').classList.add('open');
    document.getElementById('panel-overlay').classList.add('open');
    loadActivityLog(currentPanelAppNum);
  }

  window.closeStatusPanel = function() {
    document.getElementById('status-panel').classList.remove('open');
    document.getElementById('panel-overlay').classList.remove('open');
  };

  function loadActivityLog(appNum) {
    var log = document.getElementById('sp-log');
    log.innerHTML = '<div class="sp-empty">Loading…</div>';
    fetch('/activity?app=' + encodeURIComponent(appNum))
      .then(function(r) { return r.json(); })
      .then(function(data) {
        var baseline = data.baseline || null;
        var entries  = data.entries  || [];
        log.innerHTML = '';

        if (baseline) {
          var div = document.createElement('div');
          div.className = 'sp-event';
          div.innerHTML =
            '<div class="sp-event-meta">' +
              '<span class="sp-event-date">' + esc(baseline.date) + '</span>' +
              '<span class="status-chip status-evaluated">Evaluated</span>' +
            '</div>' +
            '<div class="sp-event-notes">' + esc(baseline.score) + '</div>';
          log.appendChild(div);
        }

        if (!entries.length && !baseline) {
          log.innerHTML = '<div class="sp-empty">No activity logged yet.</div>';
          return;
        }

        entries.forEach(function(e) {
          var div = document.createElement('div');
          div.className = 'sp-event';
          div.innerHTML =
            '<div class="sp-event-meta">' +
              '<span class="sp-event-date">' + esc(e.date) + '</span>' +
              '<span class="' + statusChipClass(e.event) + '">' + esc(e.event) + '</span>' +
            '</div>' +
            (e.notes ? '<div class="sp-event-notes">' + esc(e.notes) + '</div>' : '');
          log.appendChild(div);
        });
      })
      .catch(function() {
        log.innerHTML = '<div class="sp-empty" style="color:var(--red)">Failed to load activity.</div>';
      });
  }

  function statusChipClass(status) {
    var base = 'status-chip';
    var s = (status || '').toLowerCase();
    if (s === 'applied')   return base + ' status-applied';
    if (s === 'interview') return base + ' status-interview';
    if (s === 'offer')     return base + ' status-offer';
    if (s === 'rejected')  return base + ' status-rejected';
    if (s === 'discarded') return base + ' status-discarded';
    return base;
  }

  window.saveActivity = function() {
    if (!currentPanelAppNum) return;
    var event = document.getElementById('sp-event-select').value;
    var date  = document.getElementById('sp-date-input').value;
    var notes = document.getElementById('sp-notes-input').value.trim();
    if (!date) { alert('Please select a date.'); return; }
    var btn = document.getElementById('sp-save-btn');
    btn.disabled = true; btn.textContent = 'Saving…';
    fetch('/activity', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ app: currentPanelAppNum, event: event, date: date, notes: notes })
    })
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (d.ok) {
        document.getElementById('sp-notes-input').value = '';
        loadActivityLog(currentPanelAppNum);
        // Refresh score table in background so status chip updates on next open
        if (!document.getElementById('table-wrap').classList.contains('hidden')) showTable();
      }
    })
    .catch(function() { alert('Save failed. Please try again.'); })
    .finally(function() { btn.disabled = false; btn.textContent = 'Add Event'; });
  };

  function markdownToHtml(md) {
    var lines = md.split('\n');
    var html = '';
    var inUl = false, inOl = false;
    var tableLines = [];

    function fmt(text) {
      text = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      text = text.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
      text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      text = text.replace(/\*([^*\n]+)\*/g, '<em>$1</em>');
      text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
      text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
      return text;
    }

    function parseRow(line) {
      var parts = line.split('|');
      if (parts.length && parts[0].trim() === '') parts.shift();
      if (parts.length && parts[parts.length - 1].trim() === '') parts.pop();
      return parts.map(function(p) { return p.trim(); });
    }

    function isSepRow(line) {
      var cells = parseRow(line);
      return cells.length > 0 && cells.every(function(c) { return /^[\-\s:]+$/.test(c); });
    }

    function flushTable() {
      if (!tableLines.length) return;
      var rows = tableLines; tableLines = [];
      var sepIdx = -1;
      for (var j = 0; j < rows.length; j++) { if (isSepRow(rows[j])) { sepIdx = j; break; } }
      var dataRows = rows.filter(function(_, i) { return i !== sepIdx; });
      html += '<table class="md-table">';
      if (sepIdx === 1 && dataRows.length > 0) {
        html += '<thead><tr>';
        parseRow(dataRows[0]).forEach(function(c) { html += '<th>' + fmt(c) + '</th>'; });
        html += '</tr></thead><tbody>';
        for (var j = 1; j < dataRows.length; j++) {
          html += '<tr>';
          parseRow(dataRows[j]).forEach(function(c) { html += '<td>' + fmt(c) + '</td>'; });
          html += '</tr>';
        }
        html += '</tbody>';
      } else {
        dataRows.forEach(function(row) {
          html += '<tr>';
          parseRow(row).forEach(function(c) { html += '<td>' + fmt(c) + '</td>'; });
          html += '</tr>';
        });
      }
      html += '</table>';
    }

    function closeLists() {
      if (inUl) { html += '</ul>'; inUl = false; }
      if (inOl) { html += '</ol>'; inOl = false; }
    }

    for (var i = 0; i < lines.length; i++) {
      var line = lines[i];
      var trimmed = line.trim();

      if (/^\|.+\|$/.test(trimmed)) { closeLists(); tableLines.push(trimmed); continue; }
      if (tableLines.length) flushTable();

      if      (/^### /.test(line)) { closeLists(); html += '<h3>' + fmt(line.slice(4)) + '</h3>'; continue; }
      else if (/^## /.test(line))  { closeLists(); html += '<h2>' + fmt(line.slice(3)) + '</h2>'; continue; }
      else if (/^# /.test(line))   { closeLists(); html += '<h1>' + fmt(line.slice(2)) + '</h1>'; continue; }

      if (/^---+$/.test(trimmed)) { closeLists(); html += '<hr>'; continue; }

      var olM = line.match(/^(\d+)\. (.+)/);
      if (olM) {
        if (!inOl) { closeLists(); html += '<ol>'; inOl = true; }
        var liText = fmt(olM[2]);
        while (i + 1 < lines.length && /^[ \t]{2,}\S/.test(lines[i + 1])) { i++; liText += ' ' + fmt(lines[i].trim()); }
        html += '<li>' + liText + '</li>';
        continue;
      }

      if (/^- /.test(line)) {
        if (!inUl) { closeLists(); html += '<ul>'; inUl = true; }
        var liText = fmt(line.slice(2));
        while (i + 1 < lines.length && /^[ \t]{2,}\S/.test(lines[i + 1])) { i++; liText += ' ' + fmt(lines[i].trim()); }
        html += '<li>' + liText + '</li>';
        continue;
      }

      if (trimmed === '') { closeLists(); html += '<br>'; continue; }
      closeLists();
      html += '<p>' + fmt(line) + '</p>';
    }

    if (tableLines.length) flushTable();
    closeLists();
    return html;
  }

  function esc(s) {
    return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── Terminal helpers ──────────────────────────────────────────────
  function hideAllPanels() {
    ['welcome','terminal','table-wrap','stats-wrap','patterns-wrap','followup-wrap','report-wrap'].forEach(function(id) {
      document.getElementById(id).classList.add('hidden');
    });
    document.getElementById('liveness-actions').classList.remove('visible');
  }

  function showTerminal() {
    hideAllPanels();
    document.getElementById('terminal').classList.remove('hidden');
  }

  function clearOutput() {
    outputEl.innerHTML = '';
  }

  function appendLine(text) {
    var span = document.createElement('span');
    span.textContent = text + '\n';
    var t = text.trimStart();
    if (/^(✅|🟢|✓)/.test(t) || /\b(done|success|clean|no duplicates|no pending|valid)\b/i.test(t))
      span.className = 't-ok';
    else if (/^(❌|✗)/.test(t) || /\b(error|failed|invalid)\b/i.test(t))
      span.className = 't-err';
    else if (/^(⚠️|⚠)/.test(t) || /\bwarn/i.test(t))
      span.className = 't-warn';
    else if (/^(📊|📈|📅|🔍|⚡|🔀|🧹|✅ No)/.test(t) || /^=+$/.test(t))
      span.className = 't-accent';
    else if (/^\s*$/.test(text))
      span.className = 't-dim';
    outputEl.appendChild(span);
    var term = document.getElementById('terminal');
    term.scrollTop = term.scrollHeight;
  }

  function showCursor(on) {
    if (on) cursorEl.classList.remove('hidden');
    else    cursorEl.classList.add('hidden');
  }

  // ── Status / UI helpers ───────────────────────────────────────────
  function setStatus(state) {
    var badge = document.getElementById('status-badge');
    badge.className = '';
    badge.textContent = state;
    if (state === 'running') badge.classList.add('running');
    else if (state === 'done') badge.classList.add('done');
    else if (state === 'error') badge.classList.add('error');
  }

  function showStop(on) {
    var btn = document.getElementById('stop-btn');
    if (on) btn.classList.add('visible');
    else    btn.classList.remove('visible');
  }

  function setActive(id) {
    document.querySelectorAll('.cmd-btn').forEach(function(b) { b.classList.remove('active'); });
    var btn = document.getElementById('btn-' + id);
    if (btn) btn.classList.add('active');
  }

  function setTitle(title, desc) {
    document.getElementById('cmd-title').textContent = title;
    document.getElementById('cmd-desc').textContent  = desc;
  }
})();
</script>

<div id="panel-overlay" onclick="closeStatusPanel()"></div>
<div id="status-panel">
  <div id="sp-header">
    <div id="sp-title">
      <div id="sp-company"></div>
      <div id="sp-role"></div>
    </div>
    <button id="sp-close" onclick="closeStatusPanel()">✕</button>
  </div>
  <div id="sp-log"></div>
  <div id="sp-form">
    <div id="sp-form-title">Add Event</div>
    <div class="sp-row">
      <select id="sp-event-select">
        <option value="Applied">Applied</option>
        <option value="Responded">Responded</option>
        <option value="Interview">Interview</option>
        <option value="Offer">Offer</option>
        <option value="Rejected">Rejected</option>
        <option value="Discarded">Discarded</option>
      </select>
      <input type="date" id="sp-date-input">
    </div>
    <textarea id="sp-notes-input" placeholder="Notes (optional)…" spellcheck="true"></textarea>
    <button id="sp-save-btn" onclick="saveActivity()">Add Event</button>
  </div>
</div>
</body>
</html>
